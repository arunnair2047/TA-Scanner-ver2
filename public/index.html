<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TA Screener</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#ffffff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --border:#e2e0d8;--border2:#ccc9be;--text:#1a1916;--text2:#65635d;--text3:#9c9a94;
  --blue:#1a5fa8;--blue-bg:#e5f0fb;--blue-border:#aed0f5;
  --green:#3a6d10;--green-bg:#eaf2dd;--green-border:#b5d88a;
  --amber:#7d4a0a;--amber-bg:#faecd8;--amber-border:#f0c070;
  --red:#9e2c2c;--red-bg:#fceaea;--red-border:#f0a0a0;
  --purple:#4a42b0;--purple-bg:#edeefe;--purple-border:#c0bcf5;
  --gray:#5c5a55;--gray-bg:#efede6;
  --radius:10px;--radius-sm:6px;--radius-xs:4px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#app{max-width:960px;margin:0 auto;padding:24px 20px}

/* Typography */
h1{font-size:21px;font-weight:600;color:var(--text)}
h2{font-size:16px;font-weight:600;color:var(--text)}
h3{font-size:13px;font-weight:600;color:var(--text)}
.muted{color:var(--text2);font-size:13px}
.hint{color:var(--text3);font-size:12px}

/* Buttons */
button,.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);transition:background 0.15s,border-color 0.15s;font-family:inherit}
button:hover,.btn:hover{background:var(--surface2);border-color:var(--text3)}
button:disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#174f90}
.btn-demo{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.btn-demo:hover{background:#f0dfc0}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border)}
.btn-disabled{opacity:0.4;cursor:not-allowed;pointer-events:none;background:var(--surface2);color:var(--text3);border-color:var(--border)}

/* Inputs */
input,textarea,select{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue)}
textarea{resize:vertical;min-height:80px}
select{cursor:pointer}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px}
.card-hover{cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.card-hover:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.06)}

/* Pills */
.pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;line-height:1.6}
.pill-blue{background:var(--blue-bg);color:var(--blue)}
.pill-green{background:var(--green-bg);color:var(--green)}
.pill-amber{background:var(--amber-bg);color:var(--amber)}
.pill-red{background:var(--red-bg);color:var(--red)}
.pill-purple{background:var(--purple-bg);color:var(--purple)}
.pill-gray{background:var(--gray-bg);color:var(--gray)}
.pill-demo{background:var(--amber-bg);color:var(--amber);font-size:10px;padding:1px 6px;border-radius:4px}
.pill-xs{font-size:10px;padding:1px 6px}

/* Nav */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;margin-bottom:0;position:sticky;top:0;z-index:100}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:0}
.nav-brand{font-size:15px;font-weight:700;color:var(--text);padding:14px 20px 14px 0;border-right:1px solid var(--border);margin-right:8px;letter-spacing:-0.3px}
.nav-tab{padding:14px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;border-radius:0;transition:color 0.15s}
.nav-tab:hover{color:var(--text);background:none}
.nav-tab.active{color:var(--text);border-bottom-color:var(--blue)}

/* Metrics */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--surface2);border-radius:var(--radius-sm);padding:14px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700;color:var(--text)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 0 10px;margin-right:24px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;color:var(--text2);background:none;border-radius:0;font-weight:500;transition:color 0.15s}
.tab:hover{color:var(--text);background:none}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* Resume library */
.resume-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.resume-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.resume-header:hover{background:var(--bg)}
.resume-detail{border-top:1px solid var(--border);padding:14px 16px;display:none}
.resume-detail.open{display:block}

/* Search results */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.result-card.top10{border:2px solid var(--blue-border)}
.result-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.result-header:hover{background:var(--bg)}
.result-detail{border-top:1px solid var(--border);padding:14px 16px;display:none}
.result-detail.open{display:block}

/* Breakdown */
.breakdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.breakdown-cell{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}
.breakdown-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.breakdown-score{font-size:18px;font-weight:700;margin-bottom:4px}
.breakdown-notes{font-size:11px;color:var(--text2);line-height:1.4}
.sg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sg-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px}
.sg-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;color:var(--text2)}
.sg-item{font-size:12px;color:var(--text2);margin-bottom:4px;line-height:1.4}

/* Pipeline */
.pipeline-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.pipeline-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px}
.pipeline-item-info{flex:1;min-width:0}
.pipeline-item-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pipeline-item-sub{font-size:11px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* Batch status */
.batch-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px}
.batch-status{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bs-queued{background:var(--gray-bg);color:var(--gray)}
.bs-processing{background:var(--blue-bg);color:var(--blue)}
.bs-done{background:var(--green-bg);color:var(--green)}
.bs-failed{background:var(--red-bg);color:var(--red)}

/* Bucket tags */
.bucket-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple);margin:2px}
.bucket-tag .remove{cursor:pointer;opacity:0.6;font-size:12px;line-height:1}
.bucket-tag .remove:hover{opacity:1}

/* Upload area */
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-bg)}
.upload-btn-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}

/* History */
.history-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.history-time{font-size:11px;color:var(--text3);min-width:150px}

/* Status row */
.status-row{display:flex;align-items:center;gap:8px}
.status-row label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.status-row select{width:auto;font-size:12px}

/* Search box */
.search-box{border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.search-box-header{padding:14px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.search-box-body{padding:16px}

/* Empty */
.empty{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:40px;text-align:center}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Form */
.form-stack{display:flex;flex-direction:column;gap:10px}
.form-row{display:flex;gap:8px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}

/* Upstream disabled banner */
.upstream-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px}
.upstream-banner-text{flex:1;font-size:12px;color:var(--text3)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;display:none;z-index:999;max-width:300px}
.toast.show{display:block}

/* Page header */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.page-actions{display:flex;gap:8px;align-items:center}

@media(max-width:600px){
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .breakdown-grid{grid-template-columns:repeat(2,1fr)}
  .sg-grid{grid-template-columns:1fr}
}
</style>
</head>

// ─── Helpers ──────────────────────────────────────────────────────
function fmtDate(iso){if(!iso)return"—";return new Date(iso).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}
function fmtDateTime(iso){if(!iso)return"—";return new Date(iso).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}
function pill(text,cls){return`<span class="pill ${cls}">${text}</span>`}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800)}
function sortByScore(list){return[...list].sort((a,b)=>(b.score?.totalScore||0)-(a.score?.totalScore||0))}

// ─── Data API ─────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch("/api/data");
    const d=await r.json();
    state.buckets=d.buckets||state.buckets;
    state.resumes=d.resumes||[];
  }catch(e){console.error(e)}
}
async function saveResumes(){
  await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({resumes:state.resumes})});
}
async function saveBuckets(){
  await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({buckets:state.buckets})});
}

// ─── PDF extraction ───────────────────────────────────────────────
async function extractPdfText(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        const pdf=await pdfjsLib.getDocument({data:new Uint8Array(e.target.result)}).promise;
        let text="";
        for(let i=1;i<=Math.min(pdf.numPages,5);i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          text+=content.items.map(x=>x.str).join(" ")+"\n";
        }
        resolve(text.trim());
      }catch(err){reject(err)}
    };
    reader.readAsArrayBuffer(file);
  });
}

// ─── Upload handler ───────────────────────────────────────────────
async function handleUpload(files){
  if(!files.length)return;
  const over50=state.resumes.length+files.length>BATCH_LIMIT;
  if(over50){
    // Add to batch queue
    const newItems=Array.from(files).map(f=>({id:`b${Date.now()}_${Math.random()}`,filename:f.name,file:f,status:"queued"}));
    state.batchQueue=[...state.batchQueue,...newItems];
    render();
    showToast(`${files.length} files queued for batch processing`);
    return;
  }
  // Real-time processing
  for(let i=0;i<files.length;i++){
    const file=files[i];
    showToast(`Processing ${i+1}/${files.length}: ${file.name}`);
    try{
      const text=await extractPdfText(file);
      // Auto-categorise
      let catResult={candidateName:file.name.replace(".pdf",""),suggestedBuckets:[],primaryDomain:""};
      try{
        const r=await fetch("/api/categorise",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({resumeText:text,buckets:state.buckets})});
        if(r.ok)catResult=await r.json();
      }catch(e){}
      const resume={
        id:`r${Date.now()}_${i}`,
        candidateName:catResult.candidateName||file.name.replace(".pdf",""),
        filename:file.name,
        buckets:catResult.suggestedBuckets||[],
        primaryDomain:catResult.primaryDomain||"",
        status:"Applied",
        uploadedAt:new Date().toISOString(),
        resumeText:text,
        statusHistory:[{status:"Applied",timestamp:new Date().toISOString()}],
        score:null
      };
      state.resumes=[...state.resumes,resume];
      await saveResumes();
      render();
    }catch(err){console.error(err);showToast(`Failed: ${file.name}`)}
  }
  showToast(`Upload complete`);
}

// ─── Smart mock scoring (keyword-aware, no API needed) ───────────
function mockScore(resume, jd) {
  const jdLower = jd.toLowerCase();
  const resumeLower = (resume.resumeText || "").toLowerCase();
  const buckets = (resume.buckets || []).map(b => b.toLowerCase());

  // Domain keyword banks
  const domainKeywords = {
    oss: ["oss","alarm","fault","netcracker","assure","eniq","smarts","nms","ems","service assurance","performance management","network management","ericsson","huawei","nokia","ran","bss","mediation"],
    bss: ["bss","billing","crm","order management","amdocs","comverse","tmf","tm forum","revenue","charging","product catalogue","customer management"],
    billing: ["billing","revenue assurance","mediation","amdocs","comverse","charging","invoice","payment","rating","settlement"],
    contracts: ["contracts","commercial","sla","vendor","procurement","governance","legal","negotiation","sourcing"],
    network: ["network","mpls","ip","routing","switching","cisco","juniper","nso","yang","automation","netconf","restconf","sdn","nfv"],
    cloud: ["cloud","aws","azure","gcp","kubernetes","docker","devops","ci/cd","microservices","terraform","helm","jenkins"],
    pm: ["project management","programme","delivery","stakeholder","agile","safe","scrum","pmo","budget","governance"]
  };

  // Score each domain based on JD keyword presence
  function domainRelevance(keywords) {
    return keywords.filter(k => jdLower.includes(k)).length;
  }

  const ossScore = domainRelevance(domainKeywords.oss);
  const bssScore = domainRelevance(domainKeywords.bss);
  const billingScore = domainRelevance(domainKeywords.billing);
  const contractsScore = domainRelevance(domainKeywords.contracts);
  const networkScore = domainRelevance(domainKeywords.network);
  const cloudScore = domainRelevance(domainKeywords.cloud);
  const pmScore = domainRelevance(domainKeywords.pm);

  // Find dominant JD domain
  const domainScores = {oss:ossScore,bss:bssScore,billing:billingScore,contracts:contractsScore,"network engineering":networkScore,cloud:cloudScore,"project management":pmScore};
  const dominantDomain = Object.entries(domainScores).sort((a,b)=>b[1]-a[1])[0][0];

  // Bucket match bonus — resume in right bucket for JD gets a boost
  const bucketMatch = buckets.some(b => b.includes(dominantDomain) || dominantDomain.includes(b));
  const bucketBonus = bucketMatch ? 18 : 0;

  // Resume keyword match against JD
  function resumeKeywordMatch(keywords) {
    return keywords.filter(k => resumeLower.includes(k)).length;
  }

  // Skills match — how many JD keywords appear in resume
  const allJdKeywords = [...domainKeywords.oss,...domainKeywords.bss,...domainKeywords.billing,...domainKeywords.network,...domainKeywords.cloud].filter(k=>jdLower.includes(k));
  const skillMatches = allJdKeywords.filter(k=>resumeLower.includes(k)).length;
  const skillsRaw = allJdKeywords.length > 0 ? Math.round((skillMatches/allJdKeywords.length)*20) : 10;
  const skillsMatch = Math.min(25, skillsRaw + (bucketMatch ? 4 : 0));

  // Experience relevance — years and seniority signals
  const senioritySignals = ["senior","principal","lead","architect","manager","head","director","specialist"];
  const expSignals = ["years","programme","delivery","end-to-end","multi","operator","client"];
  const seniorityScore = senioritySignals.filter(s=>resumeLower.includes(s)).length;
  const expScore = expSignals.filter(s=>resumeLower.includes(s)).length;
  const experienceRelevance = Math.min(25, 10 + seniorityScore * 2 + expScore * 1 + (bucketMatch ? 3 : 0));

  // Domain fit — bucket alignment
  const domainFit = Math.min(25, 8 + bucketBonus/2 + (bucketMatch ? 6 : 0) + Math.min(5, resumeKeywordMatch(domainKeywords[dominantDomain.replace(" ","")]||domainKeywords.oss)));

  // Seniority alignment — title and experience level match
  const jdSeniority = jdLower.includes("senior") || jdLower.includes("principal") || jdLower.includes("lead") || jdLower.includes("head");
  const resumeSeniority = resumeLower.includes("senior") || resumeLower.includes("principal") || resumeLower.includes("lead") || resumeLower.includes("architect");
  const seniorityAlignment = Math.min(25, jdSeniority && resumeSeniority ? 20 + Math.floor(Math.random()*4) : jdSeniority && !resumeSeniority ? 10 + Math.floor(Math.random()*5) : 15 + Math.floor(Math.random()*6));

  const totalScore = Math.min(97, skillsMatch + experienceRelevance + domainFit + seniorityAlignment);

  // Recommendation
  let recommendation;
  if(totalScore >= 80) recommendation = "Strong Hire";
  else if(totalScore >= 65) recommendation = "Hire";
  else if(totalScore >= 50) recommendation = "Maybe";
  else recommendation = "No Hire";

  // Generate contextual notes
  const topJdTerms = allJdKeywords.filter(k=>resumeLower.includes(k)).slice(0,3).join(", ") || "general experience";
  const missingTerms = allJdKeywords.filter(k=>!resumeLower.includes(k)).slice(0,2).join(", ") || "specific tooling";

  return {
    totalScore,
    recommendation,
    breakdown: {
      skillsMatch: { score: skillsMatch, notes: skillMatches > 0 ? `Matches on ${topJdTerms}` : "Limited direct skill overlap with JD" },
      experienceRelevance: { score: experienceRelevance, notes: resumeSeniority ? "Senior-level background, relevant delivery experience" : "Some relevant experience but junior for this role" },
      domainFit: { score: domainFit, notes: bucketMatch ? `Strong ${dominantDomain.toUpperCase()} domain alignment` : `Domain fit partial — background in ${(resume.buckets||["general"])[0]}` },
      seniorityAlignment: { score: seniorityAlignment, notes: jdSeniority && resumeSeniority ? "Seniority band matches JD requirements" : "Potential seniority mismatch with role level" }
    },
    strengths: [
      bucketMatch ? `Domain expertise in ${(resume.buckets||["relevant area"])[0]}` : "Transferable skills from adjacent domain",
      resumeSeniority ? "Senior-level background with delivery ownership" : "Hands-on technical depth",
      topJdTerms ? `Demonstrated experience with ${topJdTerms.split(",")[0]}` : "Broad technical background"
    ],
    gaps: [
      missingTerms ? `Limited exposure to ${missingTerms}` : "Some tooling gaps vs JD requirements",
      !bucketMatch ? `Primary domain (${(resume.buckets||["general"])[0]}) not the core focus of this JD` : "Could strengthen specific technical areas"
    ]
  };
}

// ─── Search by JD ─────────────────────────────────────────────────
async function searchByJD(){
  const jd=state.searchJD.trim();
  if(!jd){showToast("Please enter a job description");return}

  const relevantResumes=state.resumes.filter(r=>r.resumeText&&r.resumeText.length>10);
  if(!relevantResumes.length){showToast("No resumes in library to search — load demo data first");return}

  state.searching=true;
  state.searchResults=[];
  state.searchProgress=0;
  render();

  const results=[];
  for(let i=0;i<relevantResumes.length;i++){
    const resume=relevantResumes[i];
    state.searchProgress=Math.round(((i+1)/relevantResumes.length)*100);
    const prog=document.getElementById("search-progress");
    const progBar=document.getElementById("search-progress-bar");
    const progMsg=document.getElementById("search-progress-msg");
    if(prog)prog.style.display="block";
    if(progBar)progBar.style.width=state.searchProgress+"%";
    if(progMsg)progMsg.textContent=`Scoring ${i+1} of ${relevantResumes.length}: ${resume.candidateName}`;

    // Small delay to show progress bar moving
    await new Promise(r=>setTimeout(r,120));
    const score=mockScore(resume,jd);
    results.push({...resume,score});
  }

  state.searchResults=sortByScore(results);
  state.searching=false;
  render();
  showToast(`Search complete — ${results.length} candidates scored`);
}

        <button id="btn-add-bucket" class="btn-primary" style="flex-shrink:0">Add</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${state.buckets.map(b=>{
        const count=state.resumes.filter(r=>r.buckets?.includes(b)).length;
        return`
          <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px">
            <span style="flex:1;font-weight:500">${b}</span>
            <span class="hint">${count} candidate${count!==1?"s":""}</span>
            <button data-delete-bucket="${b}" class="btn-ghost btn-danger" style="font-size:12px;padding:4px 10px">Remove</button>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

// ─── Event handlers ────────────────────────────────────────────────
function attachHandlers(){
  // Nav
  document.querySelectorAll(".nav-tab[data-nav]").forEach(el=>{
    el.addEventListener("click",()=>{state.nav=el.dataset.nav;render()});
  });

  // Library
  const btnDemo=document.getElementById("btn-demo");
  if(btnDemo)btnDemo.addEventListener("click",loadDemo);

  const fileInput=document.getElementById("file-input");
  if(fileInput)fileInput.addEventListener("change",e=>{handleUpload(Array.from(e.target.files));e.target.value=""});

  document.querySelectorAll("[data-expand]").forEach(el=>{
    el.addEventListener("click",()=>{state.expanded=state.expanded===el.dataset.expand?null:el.dataset.expand;render()});
  });

  document.querySelectorAll("[data-result-expand]").forEach(el=>{
    el.addEventListener("click",()=>{state.resultExpanded=state.resultExpanded===el.dataset.resultExpand?null:el.dataset.resultExpand;render()});
  });

  document.querySelectorAll(".tab[data-tab]").forEach(el=>{
    el.addEventListener("click",()=>{state.tab=el.dataset.tab;render()});
  });

  document.querySelectorAll("[data-status-id]").forEach(sel=>{
    sel.addEventListener("change",async e=>{e.stopPropagation();await updateStatus(sel.dataset.statusId,sel.value)});
  });

  document.querySelectorAll("[data-add-bucket]").forEach(sel=>{
    sel.addEventListener("change",async e=>{
      if(!sel.value)return;
      const r=state.resumes.find(r=>r.id===sel.dataset.addBucket);
      if(!r)return;
      const newBuckets=[...(r.buckets||[]),sel.value];
      await updateBuckets(r.id,newBuckets);
      state.resumes=state.resumes.map(res=>res.id===r.id?{...res,buckets:newBuckets}:res);
      render();
    });
  });

  document.querySelectorAll("[data-remove-bucket]").forEach(el=>{
    el.addEventListener("click",async e=>{
      e.stopPropagation();
      const r=state.resumes.find(r=>r.id===el.dataset.removeBucket);
      if(!r)return;
      const newBuckets=(r.buckets||[]).filter(b=>b!==el.dataset.bucket);
      await updateBuckets(r.id,newBuckets);
      state.resumes=state.resumes.map(res=>res.id===r.id?{...res,buckets:newBuckets}:res);
      render();
    });
  });

  // Batch
  const btnBatch=document.getElementById("btn-process-batch");
  if(btnBatch)btnBatch.addEventListener("click",processBatch);

  // Search
  const btnSearch=document.getElementById("btn-search");
  if(btnSearch)btnSearch.addEventListener("click",()=>{
    state.searchJD=document.getElementById("search-jd")?.value||"";
    state.searchTitle=document.getElementById("search-title")?.value||"";
    searchByJD();
  });

  const searchJDInput=document.getElementById("search-jd");
  if(searchJDInput)searchJDInput.addEventListener("input",e=>{state.searchJD=e.target.value});

  const searchTitleInput=document.getElementById("search-title");
  if(searchTitleInput)searchTitleInput.addEventListener("input",e=>{state.searchTitle=e.target.value});

  // Buckets
  const btnAddBucket=document.getElementById("btn-add-bucket");
  if(btnAddBucket)btnAddBucket.addEventListener("click",async()=>{
    const val=document.getElementById("new-bucket-input")?.value?.trim();
    if(!val||state.buckets.includes(val))return;
    state.buckets=[...state.buckets,val];
    await saveBuckets();
    render();
  });

  document.querySelectorAll("[data-delete-bucket]").forEach(el=>{
    el.addEventListener("click",async()=>{
      const b=el.dataset.deleteBucket;
      if(!confirm(`Remove bucket "${b}"? Resumes assigned to it will lose this tag.`))return;
      state.buckets=state.buckets.filter(x=>x!==b);
      state.resumes=state.resumes.map(r=>({...r,buckets:(r.buckets||[]).filter(x=>x!==b)}));
      await saveBuckets();
      await saveResumes();
      render();
    });
  });
}

async function processBatch(){
  state.processingBatch=true;
  render();
  for(let i=0;i<state.batchQueue.length;i++){
    const item=state.batchQueue[i];
    state.batchQueue[i]={...item,status:"processing"};
    render();
    try{
      const text=await extractPdfText(item.file);
      let catResult={candidateName:item.filename.replace(".pdf",""),suggestedBuckets:[],primaryDomain:""};
      try{
        const r=await fetch("/api/categorise",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({resumeText:text,buckets:state.buckets})});
        if(r.ok)catResult=await r.json();
      }catch(e){}
      const resume={
        id:`r${Date.now()}_${i}`,
        candidateName:catResult.candidateName||item.filename.replace(".pdf",""),
        filename:item.filename,
        buckets:catResult.suggestedBuckets||[],
        primaryDomain:catResult.primaryDomain||"",
        status:"Applied",
        uploadedAt:new Date().toISOString(),
        resumeText:text,
        statusHistory:[{status:"Applied",timestamp:new Date().toISOString()}],
        score:null
      };
      state.resumes=[...state.resumes,resume];
      state.batchQueue[i]={...state.batchQueue[i],status:"done"};
      await saveResumes();
    }catch(e){
      state.batchQueue[i]={...state.batchQueue[i],status:"failed"};
    }
    render();
  }
  state.processingBatch=false;
  setTimeout(()=>{state.batchQueue=[];render()},3000);
  showToast("Batch processing complete");
}

// ─── Boot ─────────────────────────────────────────────────────────
loadData().then(()=>render());
</script>
</body>
</html>
